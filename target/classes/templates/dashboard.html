<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StockAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff !important;
        }

        .nav-link {
            color: white !important;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: #00d4ff !important;
        }

        .page-title {
            text-align: center;
            padding: 50px 20px 30px;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
        }

        .chart-title {
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .table {
            color: white;
        }

        .table thead th {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: none;
        }

        .table tbody td {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .badge-symbol {
            background: linear-gradient(to right, #00d4ff, #7b2ff7);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .predicted {
            color: #00ff88;
            font-weight: 600;
        }

        .up {
            color: #00ff88;
        }

        .down {
            color: #ff6b6b;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line me-2"></i>StockAI
            </a>
            <a class="nav-link" href="/upload">
                <i class="fas fa-upload me-1"></i>Upload CSV
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a>
                <a class="nav-link" href="/search"><i class="fas fa-search me-1"></i>Search</a>
                <a class="nav-link" href="/add"><i class="fas fa-plus me-1"></i>Add Stock</a>
                <a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt me-1"></i>Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Page Title -->
    <div class="page-title">
        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
    </div>

    <div class="container pb-5">

        <!-- Stats Row -->
        <div class="row g-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-number" th:text="${totalStocks}">0</div>
                    <div class="stat-label">Total Records</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">🤖</div>
                    <div class="stat-number">AI</div>
                    <div class="stat-label">Predictions Active</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-number">MA</div>
                    <div class="stat-label">Moving Average Model</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-number">Live</div>
                    <div class="stat-label">Real-time Analysis</div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-card">
            <div class="chart-title">
                <i class="fas fa-chart-bar me-2"></i>
                Close Price vs Predicted Price
            </div>
            <canvas id="dashboardChart" height="80"></canvas>
        </div>

        <!-- Stock Table -->
        <div class="chart-card">
            <div class="chart-title">
                <i class="fas fa-table me-2"></i>
                All Stock Records
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Symbol</th>
                            <th>Company</th>
                            <th>Date</th>
                            <th>Close Price</th>
                            <th>AI Predicted</th>
                            <th>Trend</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="stock : ${stocks}">
                            <td th:text="${stock.id}"></td>
                            <td>
                                <span class="badge-symbol" th:text="${stock.symbol}">
                                </span>
                            </td>
                            <td th:text="${stock.companyName}"></td>
                            <td th:text="${stock.date}"></td>
                            <td th:text="${'$' + stock.closePrice}"></td>
                            <td class="predicted" th:text="${stock.predictedPrice != null ? 
                            '$' + stock.predictedPrice : 'N/A'}">
                            </td>
                            <td>
                                <span th:if="${stock.predictedPrice != null and 
                                  stock.predictedPrice > stock.closePrice}" class="up">
                                    <i class="fas fa-arrow-up"></i> Up
                                </span>
                                <span th:if="${stock.predictedPrice != null and 
                                  stock.predictedPrice < stock.closePrice}" class="down">
                                    <i class="fas fa-arrow-down"></i> Down
                                </span>
                                <span th:if="${stock.predictedPrice == null}">
                                    N/A
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const stocks = /*[[${stocks}]]*/[];
        if (stocks && stocks.length > 0) {
            const labels = stocks.map(s => s.symbol + ' ' + s.date);
            const closePrices = stocks.map(s => s.closePrice);
            const predictedPrices = stocks.map(s => s.predictedPrice);

            const ctx = document.getElementById('dashboardChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Close Price',
                            data: closePrices,
                            backgroundColor: 'rgba(0,212,255,0.6)',
                            borderColor: '#00d4ff',
                            borderWidth: 1,
                            borderRadius: 6
                        },
                        {
                            label: 'AI Predicted Price',
                            data: predictedPrices,
                            backgroundColor: 'rgba(0,255,136,0.6)',
                            borderColor: '#00ff88',
                            borderWidth: 1,
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: 'white' } }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
