<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stock - StockAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff !important;
        }

        .nav-link {
            color: white !important;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: #00d4ff !important;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
        }

        .form-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00d4ff;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(0, 212, 255, 0.25);
        }

        .btn-submit {
            background: linear-gradient(to right, #00d4ff, #7b2ff7);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            color: white;
            width: 100%;
            font-size: 1rem;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.85;
            color: white;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            color: white;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 10px;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .divider {
            border-color: rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .section-title {
            color: #00d4ff;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .tip-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 25px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line me-2"></i>StockAI
            </a>
            <a class="nav-link" href="/upload">
                <i class="fas fa-upload me-1"></i>Upload CSV
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a>
                <a class="nav-link" href="/search"><i class="fas fa-search me-1"></i>Search</a>
                <a class="nav-link" href="/add"><i class="fas fa-plus me-1"></i>Add Stock</a>
                <a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt me-1"></i>Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-card">
                    <div class="form-title">
                        <i class="fas fa-plus-circle me-2"></i>Add Stock Data
                    </div>

                    <form method="post" action="/add" th:object="${stockData}">

                        <!-- Company Info -->
                        <div class="section-title">
                            <i class="fas fa-building me-1"></i>Company Info
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Stock Symbol *</label>
                                <input type="text" class="form-control" th:field="*{symbol}"
                                    placeholder="e.g. AAPL, GOOGL, TSLA" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Company Name *</label>
                                <input type="text" class="form-control" th:field="*{companyName}"
                                    placeholder="e.g. Apple Inc." required />
                            </div>
                        </div>

                        <hr class="divider">

                        <!-- Price Info -->
                        <div class="section-title">
                            <i class="fas fa-dollar-sign me-1"></i>Price Info
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Open Price *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{openPrice}"
                                    placeholder="e.g. 150.25" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Close Price *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{closePrice}"
                                    placeholder="e.g. 155.50" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">High Price *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{highPrice}"
                                    placeholder="e.g. 158.00" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Low Price *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{lowPrice}"
                                    placeholder="e.g. 148.00" required />
                            </div>
                        </div>

                        <hr class="divider">

                        <!-- Other Info -->
                        <div class="section-title">
                            <i class="fas fa-info-circle me-1"></i>Other Info
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Volume *</label>
                                <input type="number" class="form-control" th:field="*{volume}"
                                    placeholder="e.g. 1000000" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date *</label>
                                <input type="date" class="form-control" th:field="*{date}" required />
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="row g-3 mt-2">
                            <div class="col-md-8">
                                <button type="submit" class="btn-submit">
                                    <i class="fas fa-save me-2"></i>Save Stock Data
                                </button>
                            </div>
                            <div class="col-md-4">
                                <a href="/" class="btn-back">
                                    <i class="fas fa-arrow-left me-2"></i>Back
                                </a>
                            </div>
                        </div>

                    </form>

                    <!-- Tip Box -->
                    <div class="tip-box">
                        <i class="fas fa-lightbulb me-2 text-warning"></i>
                        <strong>Tip:</strong> After saving, our AI will automatically
                        calculate the predicted next price using Moving Average algorithm!
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
